name: smoke-test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'setup.ps1'
      - 'bootstrap.ps1'
      - 'modules/**'
      - 'config/**'
      - '.github/workflows/smoke-test.yml'

jobs:
  smoke:
    name: Windows runner smoke test
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Check runner environment
        id: env
        shell: pwsh
        run: |
          $PSVersionTable | Format-List
          $hasWinget = $null -ne (Get-Command winget -ErrorAction SilentlyContinue)
          Write-Host "winget available: $hasWinget"
          if ($hasWinget) {
            winget --version
            Write-Output "winget_available=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Output "winget_available=false" >> $env:GITHUB_OUTPUT
          }

      - name: Syntax parse check (全 .ps1)
        shell: pwsh
        run: |
          $files = @(
            './bootstrap.ps1',
            './setup.ps1',
            './modules/Install-Apps.ps1',
            './modules/Set-WindowsDefaults.ps1',
            './modules/Register-Asset.ps1'
          )
          $totalErrors = 0
          foreach ($f in $files) {
            $script = Get-Content $f -Raw
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseInput($script, [ref]$null, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Host "❌ $f" -ForegroundColor Red
              $errors | ForEach-Object { Write-Host "  $_" -ForegroundColor Red }
              $totalErrors += $errors.Count
            } else {
              Write-Host "✅ $f parse OK" -ForegroundColor Green
            }
          }
          if ($totalErrors -gt 0) { exit 1 }

      - name: JSON validation (config)
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path ./config -Filter *.json -ErrorAction SilentlyContinue
          foreach ($f in $files) {
            try {
              Get-Content $f.FullName -Raw | ConvertFrom-Json | Out-Null
              Write-Host "✅ $($f.Name) valid JSON" -ForegroundColor Green
            } catch {
              Write-Host "❌ $($f.Name) JSON parse error: $_" -ForegroundColor Red
              exit 1
            }
          }

      - name: Run setup.ps1 with all winget-dependent modules skipped (when winget absent)
        if: steps.env.outputs.winget_available != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./setup.ps1 -RepoRoot $PWD -SkipModules @('Install-Apps', 'Register-Asset')

      - name: Run setup.ps1 with Install-Apps enabled (when winget present)
        if: steps.env.outputs.winget_available == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./setup.ps1 -RepoRoot $PWD -SkipModules @('Register-Asset')

      - name: Verify installed apps (only when winget available)
        if: steps.env.outputs.winget_available == 'true' && (success() || failure())
        continue-on-error: true
        shell: pwsh
        run: |
          # winget list は未インストール時に exit 非ゼロを返すので、ステップ全体は continue-on-error で握りつぶす
          $ErrorActionPreference = 'Continue'
          Write-Host "=== winget list (Chrome / Acrobat / PowerToys / PowerShell / VLC) ==="
          @(
            'Google.Chrome',
            'Adobe.Acrobat.Reader.64-bit',
            'Microsoft.PowerToys',
            'Microsoft.PowerShell',
            'VideoLAN.VLC'
          ) | ForEach-Object {
            Write-Host "--- $_ ---"
            try { winget list --id $_ --exact --accept-source-agreements 2>&1 | Out-Host } catch { Write-Host "(not installed or query failed)" }
          }

      - name: Upload setup logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-logs
          path: C:\msa-kitting-logs\
          if-no-files-found: warn
